<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="16" fill="url(#bg2)"/>

  <!-- Icon: News/RSS -->
  <g transform="translate(24, 20)">
    <!-- Newspaper icon -->
    <rect x="8" y="8" width="64" height="64" rx="8" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
    <line x1="20" y1="24" x2="60" y2="24" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
    <line x1="20" y1="36" x2="48" y2="36" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="48" x2="52" y2="48" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="60" x2="44" y2="60" stroke="#f59e0b" stroke-width="2" opacity="0.3"/>

    <!-- Signal waves -->
    <path d="M58 50 a8 8 0 0 1 0-12" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M62 54 a14 14 0 0 1 0-20" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.4"/>
  </g>

  <!-- Text -->
  <text x="110" y="48" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="800" fill="white">Korean AI News Hub</text>
  <text x="110" y="76" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="600" fill="url(#accent2)">MCP Server</text>
  <text x="110" y="100" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#94a3b8">Breaking · Tech · AI · Claude · Trending</text>
</svg>
